apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: agentic-o11y-mcp
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      resourcedetection:
        detectors: [env, system]
        timeout: 5s

    exporters:
      # Traces → Splunk Observability Cloud (jp0)
      otlphttp/traces:
        endpoint: "https://ingest.jp0.signalfx.com/v2/trace/otlp"
        headers:
          X-SF-Token: "${SPLUNK_O11Y_TOKEN}"

      # Metrics → Splunk Observability Cloud (jp0) via SignalFx exporter
      signalfx:
        access_token: "${SPLUNK_O11Y_TOKEN}"
        realm: jp0

      # Logs → Splunk Enterprise HEC
      splunk_hec/logs:
        token: "${SPLUNK_HEC_TOKEN}"
        endpoint: "${SPLUNK_HEC_URL}/services/collector/event"
        index: "demo_logs"
        sourcetype: "demo:app"
        source: "k8s:agentic-o11y-mcp"
        tls:
          insecure_skip_verify: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters: [otlphttp/traces]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters: [signalfx]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [splunk_hec/logs]
