apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: agentic-o11y-mcp
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.104.0
          args:
            - "--config=/etc/otel/otel-collector-config.yaml"
          env:
            - name: SPLUNK_O11Y_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentic-o11y-mcp-secrets
                  key: splunk_o11y_token
            - name: SPLUNK_HEC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentic-o11y-mcp-secrets
                  key: splunk_hec_token
            - name: SPLUNK_HEC_URL
              valueFrom:
                configMapKeyRef:
                  name: agentic-o11y-mcp-config
                  key: SPLUNK_HEC_URL
          ports:
            - containerPort: 4317   # OTLP gRPC
            - containerPort: 4318   # OTLP HTTP
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config
